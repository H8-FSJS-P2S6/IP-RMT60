openapi: 3.0.0
info:
  title: HacTruck API
  version: 1.0.0
paths:
  /api/register:
    post:
      summary: Register a new user
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string }
                password: { type: string }
                role: { type: string, enum: [driver, user] }
                phone: { type: string }
      responses:
        '201':
          description: User registered
  /api/login:
    post:
      summary: Login a user
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: User logged in
  /api/google-login:
    post:
      summary: Login with Google OAuth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
      responses:
        '200':
          description: User logged in
  /api/posts:
    get:
      summary: Get all posts
      responses:
        '200':
          description: List of posts
    post:
      summary: Create a new post
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                truckType: { type: string }
                maxWeight: { type: integer }
                origin: { type: string }
                destination: { type: string }
                availableDate: { type: string }
                availableTime: { type: string }
                shippingCost: { type: integer }
      responses:
        '201':
          description: Post created
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT